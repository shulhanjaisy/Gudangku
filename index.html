<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Warehouse Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f6f9; }
    h2 { color: #333; }
    .status-card {
      background: white; padding: 15px; border-radius: 8px; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px;
    }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background-color: #007bff; color: white; }
    .badge-allowed { color: green; font-weight: bold; }
    .badge-denied { color: red; font-weight: bold; }
  </style>
</head>
<body>

  <h2>📦 Smart Warehouse - Live Access Monitor</h2>

  <div class="status-card">
    Status Koneksi Web: <strong id="net-status" style="color: orange;">Menghubungkan...</strong><br>
    Aktivitas Terakhir: <strong id="latest-user">-</strong>
  </div>

  <h3>Riwayat Tap Kartu (Logs)</h3>
  <table>
    <thead>
      <tr>
        <th>Waktu</th>
        <th>UID RFID</th>
        <th>Nama Staff</th>
        <th>Aksi</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="log-table-body">
      <tr><td colspan="5">Memuat data...</td></tr>
    </tbody>
  </table>

  <script>
    // 💡 GANTI DENGAN URL GOOGLE APPS SCRIPT DEPLOYMENT KAMU
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz98TFdTbcL8yHeDdt-3YdSGknya0_Ao3MPsYDFGWDFYyJ-aLTvSB1wyISZQawf2p_HsQ/exec";

    function fetchDataFromSheets() {
      fetch(GAS_URL + "?action=GET_LOGS")
        .then(response => response.json())
        .then(data => {
          if (data.status === "SUCCESS") {
            document.getElementById("net-status").innerText = "Terhubung (Real-time)";
            document.getElementById("net-status").style.color = "green";

            const logs = data.logs.reverse(); // Tampilkan log paling baru di atas
            let tableRows = "";

            if (logs.length > 0) {
              // Set aktivitas terakhir
              document.getElementById("latest-user").innerText = 
                `${logs[0].staff_name} (${logs[0].rfid_uid}) - Status: ${logs[0].status}`;

              logs.forEach(log => {
                const statusClass = log.status === "ALLOWED" ? "badge-allowed" : "badge-denied";
                const timeFormatted = new Date(log.timestamp).toLocaleString("id-ID");

                tableRows += `
                  <tr>
                    <td>${timeFormatted}</td>
                    <td>${log.rfid_uid}</td>
                    <td>${log.staff_name}</td>
                    <td>${log.type}</td>
                    <td class="${statusClass}">${log.status}</td>
                  </tr>
                `;
              });
            } else {
              tableRows = `<tr><td colspan="5">Belum ada data log.</td></tr>`;
            }

            document.getElementById("log-table-body").innerHTML = tableRows;
          }
        })
        .catch(err => {
          console.error("Gagal mengambil data:", err);
          document.getElementById("net-status").innerText = "Gagal Konek Ke Server";
          document.getElementById("net-status").style.color = "red";
        });
    }

    // Jalankan pertama kali & atur auto-refresh setiap 2 detik
    fetchDataFromSheets();
    setInterval(fetchDataFromSheets, 2000);
  </script>
</body>
</html>
